# ==========================================
# Celeb-DF v2 Cross-Dataset Test Configuration
# ==========================================

name: "Celeb-DF-v2-CrossTest"

# --- 路径设置 ---
# 这里的路径是相对于项目根目录的
data_root: "data/clips/Celeb-DF-v2"    # 视频片段文件夹
index_path: "tools/analysis/crosstestindex/celebdfv2_crosstest_index.pkl" # 索引文件

# --- 数据集过滤 (Dataset Filtering) ---
# 如果索引文件包含多个数据集，通过路径模式过滤出当前数据集
# 支持多个模式，只要路径中包含任一模式即匹配
path_patterns:
  - "Celeb-real"      # Celeb-DF 真实视频 (Celebrity)
  - "YouTube-real"    # Celeb-DF 真实视频 (YouTube)
  - "Celeb-synthesis" # Celeb-DF 伪造视频

# --- 划分策略 ---
# Cross-Dataset 实验通常使用全量数据进行测试
split_ratios:
  train: 0.0
  val: 0.0
  test: 1.0

# --- 预处理参数 ---
# 保持与训练时一致的归一化参数
normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

