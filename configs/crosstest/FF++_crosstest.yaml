# ==========================================
# FaceForensics++ Cross-Dataset Test Configuration
# ==========================================

name: "FaceForensics++ Cross-Dataset Test"

# --- 路径设置 ---
data_root: "data/clips/FaceForensics++"
index_path: "tools/analysis/crosstestindex/FF++_crosstest_index.pkl"

# --- 数据集过滤 (Dataset Filtering) ---
# 只包含真实视频和 Deepfakes 伪造视频（与 Celeb-DF-v2 的单一伪造方式对应）
path_patterns:
  - "original_sequences"
  - "manipulated_sequences/Deepfakes"

# --- 划分策略 ---
split_ratios:
  train: 0.0
  val: 0.0
  test: 1.0

# --- 预处理参数 ---
normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
