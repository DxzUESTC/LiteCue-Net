# LiteCue-Net high-budget domain generalization preset.
# This keeps the original train.yaml intact and turns on the new generalization stack.

save_dir: "checkpoints/exp_generalization"
log_dir: "logs"
dataset_config: "configs/dataset/multisource.yaml"

epochs: 50
batch_size: 16
lr: 0.0001
weight_decay: 0.0001
num_workers: 0
seed: 42
use_amp: true

model:
  feature_dim: 256
  clip_num: 16
  clip_len: 4
  num_classes: 2
  backbone: "mobilenetv4_conv_small.e2400_r224_in1k"
  token_dropout: 0.1
  use_temporal_diff: true
  use_frequency_branch: true

augmentation:
  use_aug: true
  level: "strong_domain"

occlusion:
  enabled: true
  prob: 0.5
  scale_range: [0.1, 0.35]
  fill: "mean"
  num_patches: 1

domain_randomization:
  enabled: true
  occlusion:
    enabled: true
    prob: 0.5
    scale_range: [0.05, 0.30]
    fill: "mean"
    num_patches: 2
    edge_bias: 0.4
  temporal:
    enabled: true
    drop_prob: 0.03
    repeat_prob: 0.03
    motion_blur_prob: 0.15
    motion_blur_kernel: 5

sampling:
  balanced: true
  balance_keys: ["label", "dataset", "method"]
  replacement: true

loss:
  video_weight: 1.0
  clip_weight: 1.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  label_smoothing: 0.05

generalization:
  enabled: true
  num_domains: 0
  grl_lambda: 1.0
  supcon_weight: 0.05
  supcon_temperature: 0.2
  coral_weight: 0.01
  mmd_weight: 0.0
  domain_adv_weight: 0.05
  groupdro_weight: 0.05
  groupdro_eta: 0.1
